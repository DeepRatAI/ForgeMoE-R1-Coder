structured_edit_intent_v0:
  name: structured_edit_intent_contract_v0
  purpose:
    - replace_raw_diff_generation_with_structured_edit_intent
    - build_canonical_unified_diffs_from_validated_intents
    - make_patch_application_deterministic
    - create_training_target_for_future_sft_and_rl

  intent_schema:
    fields:
      - intent_id
      - task_id
      - file_path
      - find_text
      - replace_text
      - rationale
    constraints:
      - file_path_must_exist
      - find_text_must_exist_exactly_once
      - replacement_must_be_non_empty
      - no_test_file_edits_by_default

  builder_outputs:
    - canonical_unified_diff
    - validation_report
    - applied_patch_result
    - post_test_result

  source_rationale:
    step22_finding: raw_diff_outputs_were_non_actionable
    next_boundary: model_outputs_structured_intent_not_patch_text

gpu_required: false
h100_purchase_required: false
