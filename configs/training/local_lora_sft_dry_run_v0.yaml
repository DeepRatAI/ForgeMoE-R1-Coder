local_lora_sft_dry_run_v0:
  name: local_lora_sft_dry_run_v0
  mode: memory_safe_architecture_dry_run
  reason:
    - aws_cloudshell_killed_full_qwen_0_5b_cpu_weight_load
    - avoid_retrying_full_weight_load_in_low_memory_shell
    - validate_lora_boundary_using_real_qwen_config_and_tiny_qwen2_architecture

  base_model:
    model_id: Qwen/Qwen2.5-Coder-0.5B-Instruct
    config_source: huggingface_autoconfig
    full_weight_load_in_cloudshell: disabled

  architecture_probe:
    tiny_qwen2_config:
      vocab_size: 1024
      hidden_size: 64
      intermediate_size: 128
      num_hidden_layers: 2
      num_attention_heads: 4
      num_key_value_heads: 4

  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    bias: none
    task_type: CAUSAL_LM
    target_module_candidates:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

  source_dataset:
    train_jsonl: results/local/local_adapter_training_plan_v0/train.jsonl
    eval_jsonl: results/local/local_adapter_training_plan_v0/eval.jsonl

  output:
    dry_run_report: results/local/local_lora_sft_dry_run_v0/dry_run_report.json
    architecture_report: results/local/local_lora_sft_dry_run_v0/architecture_report.json
    training_job_spec: results/local/local_lora_sft_dry_run_v0/training_job_spec_sagemaker.json

gpu_required_for_this_step: false
h100_purchase_required_for_this_step: false
